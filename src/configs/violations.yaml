# Violation-Specific Configuration
# Each violation has an independent confidence threshold for auto-approval
# and additional parameters specific to its detection logic.

violations:

  helmet:
    enabled: true
    auto_approve_confidence: 0.75   # TUNED: was 0.88; model returns 0.65–0.86 so lowered to auto-flag real violations
    head_roi_fraction: 0.35
    flag_invalid_helmet: true       # TUNED: was false; now flags cloth/scarf-covered heads too
    refresh_interval: 30            # frames between re-checks on same motorcycle track
    min_confirm_frames: 2           # recheck cycles that must agree before violation is emitted

  seatbelt:
    enabled: true
    # NOTE: The pretrained seatbelt model (RISEF/yolov11s-seatbelt) was trained
    # on eye-level dashcam images. Deployed from an overhead traffic camera, it
    # produces overconfident but wrong predictions (e.g. conf=1.0 on wrong car).
    # Threshold raised to 0.97 so all seatbelt detections go to human review
    # until the model is fine-tuned on overhead-angle training data.
    auto_approve_confidence: 0.97
    hf_model_repo: "RISEF/yolov11s-seatbelt"
    hf_model_cache: "models/weights/seatbelt_yolov11s.pt"
    hf_model_filename: "weights/best.pt"
    windshield_top_fraction: 0.15
    windshield_bottom_fraction: 0.55
    min_crop_width: 60
    min_crop_height: 40
    refresh_interval: 60            # frames between re-checks on same car track
    min_confirm_frames: 2           # recheck cycles that must agree before violation is emitted

  triple_riding:
    enabled: true
    auto_approve_confidence: 0.95   # rule-based so always 1.0; threshold is effectively a no-op
    min_person_overlap_ratio: 0.30  # TUNED: was 0.5; COCO motorcycle boxes often clip riders partially

  wrong_side:
    enabled: true
    auto_approve_confidence: 0.92
    min_track_frames: 8             # ignore short tracks (< N frames) to avoid false positives
    # Direction deviation beyond cameras.yaml tolerance for this many consecutive frames = violation
    consecutive_wrong_frames: 5

  stop_line:
    enabled: true
    auto_approve_confidence: 0.92
    # How many pixels past the stop line counts as a crossing
    crossing_margin_px: 5

  red_light:
    enabled: true
    auto_approve_confidence: 0.92
    # Minimum fraction of red pixels in the signal ROI to classify signal as "red"
    red_pixel_fraction: 0.15
    # Minimum fraction of green pixels to classify as "green"
    green_pixel_fraction: 0.10

  illegal_parking:
    enabled: true
    auto_approve_confidence: 0.95   # rule-based; threshold is a no-op
    # Vehicle must be stationary inside a no-parking polygon for this many seconds to be flagged
    dwell_time_seconds: 180         # 3 minutes
    # A vehicle is "stationary" if its centroid moves less than this many pixels between frames
    stationary_pixel_threshold: 15

tracker:
  # ByteTrack parameters
  track_thresh: 0.50
  track_buffer: 30                  # frames to keep a lost track alive
  match_thresh: 0.80
  frame_rate: 10                    # should match pipeline.yaml target_fps
